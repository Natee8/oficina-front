<div class="row">
  <div class="field">
    <app-input-field
      label="CEP"
      type="text"
      labelBgColor="#fff"
      [(ngModel)]="addressZip"
      (ngModelChange)="addressZipChange.emit($event)"
    ></app-input-field>
  </div>

  <div class="field small">
    <app-input-field
      label="Número"
      labelBgColor="#fff"
      type="text"
      [(ngModel)]="addressNumber"
      (ngModelChange)="addressNumberChange.emit($event)"
    ></app-input-field>
  </div>
</div>

<div class="field">
  <app-input-field
    label="Rua"
    labelBgColor="#fff"
    type="text"
    [(ngModel)]="addressStreet"
    (ngModelChange)="addressStreetChange.emit($event)"
  ></app-input-field>
</div>

<div class="field">
  <app-input-field
    label="Bairro"
    type="text"
    labelBgColor="#fff"
    [(ngModel)]="addressDistrict"
    (ngModelChange)="addressDistrictChange.emit($event)"
  ></app-input-field>
</div>

<div class="row">
  <div class="field">
    <app-input-field
      label="Cidade"
      type="text"
      labelBgColor="#fff"
      [(ngModel)]="addressCity"
      (ngModelChange)="addressCityChange.emit($event)"
    ></app-input-field>
  </div>

  <div class="field small">
    <app-input-field
      label="Estado"
      type="text"
      labelBgColor="#fff"
      [(ngModel)]="addressState"
      (ngModelChange)="addressStateChange.emit($event)"
    ></app-input-field>
  </div>
</div>
