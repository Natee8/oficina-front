<div class="row">
  <app-input-field label="CEP" [(ngModel)]="data.addressZip"></app-input-field>
  <div *ngIf="errors['addressZip']">
    {{ errors['addressZip'] }}
  </div>

  <div class="field small">
    <app-input-field
      label="Número"
      labelBgColor="#fff"
      type="text"
      [(ngModel)]="data.addressNumber"
      (ngModelChange)="data.addressNumberChange.emit($event)"
    ></app-input-field>
    <div *ngIf="errors['addressNumber']">
      {{ errors['addressNumber'] }}
    </div>
  </div>
</div>

<div class="field">
  <app-input-field
    label="Rua"
    labelBgColor="#fff"
    type="text"
    [(ngModel)]="data.addressStreet"
    (ngModelChange)="data.addressStreetChange.emit($event)"
  ></app-input-field>
  <div *ngIf="errors['addressStreet']">
    {{ errors['addressStreet'] }}
  </div>
</div>

<div class="field">
  <app-input-field
    label="Bairro"
    type="text"
    labelBgColor="#fff"
    [(ngModel)]="data.addressDistrict"
    (ngModelChange)="data.addressDistrictChange.emit($event)"
  ></app-input-field>
  <div *ngIf="errors['addressDistrict']">
    {{ errors['addressDistrict'] }}
  </div>
</div>

<div class="row">
  <div class="field">
    <app-input-field
      label="Cidade"
      type="text"
      labelBgColor="#fff"
      [(ngModel)]="data.addressCity"
      (ngModelChange)="data.addressCityChange.emit($event)"
    ></app-input-field>
    <div *ngIf="errors['addressCity']">
      {{ errors['addressCity'] }}
    </div>
  </div>

  <div class="field small">
    <app-input-field
      label="Estado"
      type="text"
      labelBgColor="#fff"
      [(ngModel)]="data.addressState"
      (ngModelChange)="data.addressStateChange.emit($event)"
    ></app-input-field>
    <div *ngIf="errors['addressState']">
      {{ errors['addressState'] }}
    </div>
  </div>
</div>
