<app-table-header icon="fa-solid fa-store" title="Lojas"></app-table-header>

<div class="table-container">
  <div class="table-scroll">
    <div class="table table-grid">
      <div class="table-head" [style.grid-template-columns]="'2fr 2fr 2fr 1fr 2fr 2fr 120px'">
        <div *ngFor="let col of columns">{{ col.label }}</div>
      </div>

      <div
        class="table-row"
        *ngFor="let store of stores"
        [style.grid-template-columns]="'2fr 2fr 2fr 1fr 2fr 2fr 120px'"
      >
        <div class="table-cell">{{ store.name }}</div>
        <div class="table-cell">{{ store.cnpj }}</div>
        <div class="table-cell">{{ store.addressStreet }}</div>
        <div class="table-cell">{{ store.addressNumber }}</div>
        <div class="table-cell">{{ store.addressCity }}</div>
        <div class="table-cell">{{ store.addressDistrict }}</div>

        <div class="table-cell">
          <app-table-actions (onEdit)="handleEdit(store)" (onDelete)="handleDelete(store)" />
        </div>
      </div>
    </div>
  </div>

  <app-edit-store-modal
    *ngIf="activeModal === 'edit'"
    (closeModalEvent)="handleModalClose($event)"
    [store]="selectedStore"
  ></app-edit-store-modal>

  <app-modal-delete
    *ngIf="activeModal === 'delete'"
    [registro]="selectedStore?.id"
    (confirm)="confirmDelete()"
    (cancel)="closeModal()"
  ></app-modal-delete>

  <app-table-footer
    [page]="page"
    [totalPages]="totalPages"
    [totalItems]="stores.length"
    [pageSize]="5"
  ></app-table-footer>
</div>
