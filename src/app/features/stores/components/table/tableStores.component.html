<app-table-header
  icon="fa-solid fa-users"
  title="Clientes"
  (search)="handleSearch($event)"
></app-table-header>

<div class="table-container">
  <div class="table table-grid">
    <div class="table-head" [style.grid-template-columns]="'2fr 2fr 2fr 1fr 2fr 2fr 120px'">
      <div *ngFor="let col of columns">{{ col.label }}</div>
    </div>

    <div
      class="table-row"
      *ngFor="let client of stores"
      [style.grid-template-columns]="'2fr 2fr 2fr 1fr 2fr 2fr 120px'"
    >
      <div class="table-cell">{{ client.name }}</div>
      <div class="table-cell">{{ client.cnpj }}</div>
      <div class="table-cell">{{ client.street }}</div>
      <div class="table-cell">{{ client.number }}</div>
      <div class="table-cell">{{ client.city }}</div>
      <div class="table-cell">{{ client.neighborhood }}</div>
      <div class="table-cell">
        <app-table-actions (onEdit)="handleEdit(client)" (onDelete)="handleDelete(client)" />
      </div>
    </div>
  </div>

  <app-table-footer
    [page]="page"
    [totalPages]="totalPages"
    [totalItems]="stores.length"
    [pageSize]="5"
    (pageChange)="changePage($event)"
  ></app-table-footer>
</div>
