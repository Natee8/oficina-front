<div class="form-container">
  <form class="form-content">
    <app-input-field
      name="name"
      type="text"
      label="Nome da empresa"
      [maxlength]="50"
      [(ngModel)]="data.name"
    ></app-input-field>

    <app-input-field
      name="storename"
      type="text"
      label="Nome da loja"
      [(ngModel)]="data.storeName"
    ></app-input-field>

    <app-input-field
      name="cnpj"
      type="text"
      label="CNPJ"
      mask="cnpj"
      [(ngModel)]="data.cnpj"
    ></app-input-field>
  </form>
</div>
