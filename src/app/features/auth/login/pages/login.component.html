<div class="login-container">
  <h2>Entre com sua conta para acessar o sistema</h2>
  <p>Entre com sua conta para ter acesso ao nosso sistema de gerenciamento</p>

  <form class="login-form" (ngSubmit)="handleLogin($event)">
    <app-input-field
      type="text"
      id="username"
      name="email"
      label="Email"
      placeholder="Digite seu Email aqui"
      [maxlength]="50"
      mask="email"
      width="100%"
      [(ngModel)]="email"
    ></app-input-field>
    <div class="error" *ngIf="errors['email']">{{ errors['email'] }}</div>

    <a class="forgot-password" [routerLink]="['/login/forgot-password']">Esqueci a senha</a>

    <app-input-field
      type="password"
      id="password"
      label="Senha"
      name="password"
      placeholder="Digite sua senha"
      [maxlength]="50"
      [(ngModel)]="password"
    ></app-input-field>
    <div class="error" *ngIf="errors['password']">{{ errors['password'] }}</div>

    <div class="btn-container">
      <button type="submit" class="btn-primary">Entrar</button>
    </div>

    <div class="divider"></div>

    <p class="signup-text">
      Ainda não tem conta? <a routerLink="/register">Clique aqui para se cadastrar</a>
    </p>
  </form>
</div>
