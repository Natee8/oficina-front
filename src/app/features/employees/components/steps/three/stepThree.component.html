<app-select-field
  label="Cargo"
  [options]="cargosOptions"
  [(ngModel)]="cargo"
  (ngModelChange)="cargoChange.emit($event)"
></app-select-field>
<div class="error" *ngIf="errors['cargo']">{{ errors['cargo'] }}</div>

<app-select-field
  label="Loja"
  type="text"
  labelBgColor="#fff"
  [(ngModel)]="loja"
  (ngModelChange)="lojaChange.emit($event)"
  [options]="lojasOptionsSelect"
></app-select-field>
<div class="error" *ngIf="errors['loja']">{{ errors['loja'] }}</div>

<app-input-field
  label="Email"
  labelBgColor="#fff"
  [(ngModel)]="email"
  (ngModelChange)="emailChange.emit($event)"
></app-input-field>
<div class="error" *ngIf="errors['email']">{{ errors['email'] }}</div>

<app-input-field
  label="Senha"
  type="password"
  labelBgColor="#fff"
  [(ngModel)]="senha"
  (ngModelChange)="senhaChange.emit($event)"
></app-input-field>
<div class="error" *ngIf="errors['senha']">{{ errors['senha'] }}</div>
