<div class="containerHeader">
  <div class="header-top">
    <h1>Funcionários</h1>
    <p>Gerencie e visualize aqui seus funcionários cadastrados</p>
  </div>

  <div class="header-bottom">
    <div class="containerButtons">
      <app-action-button
        label="Filtros"
        icon="fa-solid fa-sliders"
        (clickAction)="toggleDropdown()"
      ></app-action-button>

      <app-action-button
        label="Novo Funcionário"
        icon="fa-solid fa-plus"
        route="/employees-create"
        variant="primary"
      ></app-action-button>
    </div>
  </div>
</div>

<app-dropdown
  [open]="openDropdown"
  [groups]="filterGroups"
  [(filters)]="filters"
  (applyFilters)="applyFilters()"
  (clearFilters)="clearFilters()"
></app-dropdown>

<app-table-employees [filters]="appliedFilters"></app-table-employees>
