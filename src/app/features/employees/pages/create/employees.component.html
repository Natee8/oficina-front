<div class="containerHeader">
  <h1>Novo Funcionário</h1>
  <p>Adicione um novo funcionário a sua loja</p>
  <app-back-button (back)="goBackList()"></app-back-button>
</div>

<app-register-card
  [title]="steps[stepIndex].title"
  [subtitle]="steps[stepIndex].description"
  [stpsatual]="stepIndex + 1"
  [steptotal]="steps.length"
  [image]="steps[stepIndex].image"
  (next)="nextStep()"
  (back)="previousStep()"
>
  <ng-container [ngSwitch]="stepIndex">
    <app-step-one
      *ngSwitchCase="0"
      [(name)]="nome"
      [(cpf)]="cpf"
      [(phone)]="telefone"
    ></app-step-one>

    <app-step-two
      *ngSwitchCase="1"
      [(addressZip)]="addressZip"
      [(addressNumber)]="addressNumber"
      [(addressStreet)]="addressStreet"
      [(addressDistrict)]="addressDistrict"
      [(addressCity)]="addressCity"
      [(addressState)]="addressState"
    ></app-step-two>

    <app-step-three
      *ngSwitchCase="2"
      [(cargo)]="cargo"
      [(loja)]="loja"
      [(email)]="email"
      [(senha)]="senha"
      [cargos]="cargos"
      [lojas]="lojas"
    ></app-step-three>
  </ng-container>
</app-register-card>
