<div class="containerHeader">
  <h1>Novo Funcionário</h1>
  <p>Adicione um novo funcionário a sua loja</p>
  <app-back-button (back)="goBackList()"></app-back-button>
</div>

<app-register-card
  [title]="currentStep.title"
  [subtitle]="currentStep.description"
  [stepInfo]="currentStep.stepInfo"
  [image]="currentStep.image"
>
  <ng-container [ngSwitch]="step">
    <app-step-one
      *ngSwitchCase="1"
      [(name)]="nome"
      [(cpf)]="cpf"
      [(phone)]="telefone"
    ></app-step-one>

    <app-step-two
      *ngSwitchCase="2"
      [(addressZip)]="addressZip"
      [(addressNumber)]="addressNumber"
      [(addressStreet)]="addressStreet"
      [(addressDistrict)]="addressDistrict"
      [(addressCity)]="addressCity"
      [(addressState)]="addressState"
    ></app-step-two>

    <app-step-three
      *ngSwitchCase="3"
      [(cargo)]="cargo"
      [(loja)]="loja"
      [(email)]="email"
      [(senha)]="senha"
      [cargos]="cargos"
      [lojas]="lojas"
    ></app-step-three>
  </ng-container>
</app-register-card>
