<div class="containerHeader">
  <h1>Novo Funcionário</h1>
  <p>Adicione um novo funcionário a sua loja</p>
  <app-back-button (back)="goBackList()"></app-back-button>
</div>

<app-register-card
  [title]="steps[stepIndex].title"
  [subtitle]="steps[stepIndex].description"
  [stpsatual]="stepIndex + 1"
  [steptotal]="steps.length"
  [image]="steps[stepIndex].image"
  [backgroundImage]="steps[stepIndex].background"
  (next)="nextStep()"
  (back)="previousStep()"
>
  <ng-container [ngSwitch]="stepIndex">
    <app-step-one
      *ngSwitchCase="0"
      [(name)]="employeeData.nome"
      [(cpf)]="employeeData.cpf"
      [(phone)]="employeeData.telefone"
    ></app-step-one>

    <app-step-two
      *ngSwitchCase="1"
      [(addressZip)]="employeeData.addressZip"
      [(addressNumber)]="employeeData.addressNumber"
      [(addressStreet)]="employeeData.addressStreet"
      [(addressDistrict)]="employeeData.addressDistrict"
      [(addressCity)]="employeeData.addressCity"
      [(addressState)]="employeeData.addressState"
    ></app-step-two>

    <app-step-three
      *ngSwitchCase="2"
      [(cargo)]="employeeData.cargo"
      [(loja)]="employeeData.loja"
      [(email)]="employeeData.email"
      [(senha)]="employeeData.senha"
    ></app-step-three>
  </ng-container>
</app-register-card>
