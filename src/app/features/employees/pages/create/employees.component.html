<div class="containerHeader">
  <h1>Novo Funcionário</h1>
  <p>Adicione um novo funcionário a sua loja</p>
  <app-back-button (back)="goBack()"></app-back-button>
</div>

<ng-container *ngIf="step === 1">
  <app-register-card
    title="Informações do Funcionário"
    description="Adicione as informações de contato do funcionário"
    image="assets/images/employee.svg"
    stepInfo="Etapa 1 - 2"
  >
    <app-input-field label="Nome" type="text" [(value)]="nome"></app-input-field>
    <app-input-field label="CPF" type="text" [(value)]="cpf"></app-input-field>
    <app-input-field label="Email" type="text" [(value)]="email"></app-input-field>
    <app-input-field label="Senha" type="password" [(value)]="senha"></app-input-field>
    <button type="button" class="btn-primary upscale" (click)="nextStep()">Avançar</button>
  </app-register-card>
</ng-container>

<ng-container *ngIf="step === 2">
  <app-register-card
    title="Informações do Funcionário"
    description="Adicione as informações de contato do funcionário"
    image="assets/images/employee.svg"
    stepInfo="Etapa 2 - 2"
  >
    <app-input-field label="Telefone" type="text" [(value)]="telefone"></app-input-field>
    <app-select-field label="Cargo" [options]="cargos" [(value)]="cargo"></app-select-field>
    <app-select-field label="Loja" [options]="lojas" [(value)]="loja"></app-select-field>
    <button type="button" class="btn-primary upscale" (click)="submit()">Finalizar</button>
    <button type="button" class="btn-secondary" (click)="goBack()">Voltar</button>
  </app-register-card>
</ng-container>
