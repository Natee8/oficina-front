<div class="containerHeader">
  <h1>Bem vindo! {{ profile.name }}</h1>
  <p>Seja bem vindo ao modulo de administrador do sistemas de Oficina mecanica</p>
  <form class="profile-form" (submit)="onSubmit($event)">
    <app-input-field
      type="text"
      id="profileName"
      label="Nome"
      placeholder="Digite seu nome"
      [maxlength]="100"
      [(ngModel)]="profile.name"
      name="profileName"
      required
    ></app-input-field>
    
    <app-input-field
      type="text"
      id="profileEmail"
      label="Email"
      placeholder="Digite seu email"
      [maxlength]="100"
      [(ngModel)]="profile.email"
      name="profileEmail"
    />

    <app-input-field
      type="text"
      id="profileRole"
      label="Cargo"
      [(ngModel)]="profile.role"
      name="profileRole"
      [disabled]="true"
    />
    <button type="submit" class="btn-primary upscale">Editar dados</button>
  </form>
</div>
