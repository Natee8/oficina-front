<div class="containerHeader">
  <h1>NFs</h1>
  <p>Agrupamento por loja</p>
</div>

<section class="upload-card">
  <div class="upload-icon" aria-hidden="true">
    <i class="fa-solid fa-file-arrow-up"></i>
  </div>

  <h2>Fazer upload de Planilha</h2>
  <p>Gerencie e visualize aqui os clientes referentes as suas lojas</p>

  <div class="upload-actions">
    <input id="excel-upload" class="hidden-input" type="file" accept=".xlsx,.xls,.csv" />

    <label for="excel-upload" class="upload-button upscale">
      <i class="fa-solid fa-folder-open"></i>
      <span>Selecionar Excel</span>
    </label>

    <button type="button" class="format-link">
      <span>Ver formato esperado</span>
      <i class="fa-solid fa-circle-info"></i>
    </button>
  </div>
</section>
