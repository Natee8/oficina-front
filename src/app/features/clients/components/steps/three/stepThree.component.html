<app-select-field
  label="Loja"
  [options]="lojas"
  [(ngModel)]="loja"
  labelBgColor="#fff"
  (ngModelChange)="lojaChange.emit($event)"
></app-select-field>

<app-select-field
  label="Tipo Legal"
  labelBgColor="#fff"
  [options]="tiposLegais"
  [(ngModel)]="tipoLegal"
  (ngModelChange)="tipoLegalChange.emit($event)"
></app-select-field>

<app-input-field
  label="Observações"
  labelBgColor="#fff"
  [(ngModel)]="notes"
  (ngModelChange)="notesChange.emit($event)"
></app-input-field>
