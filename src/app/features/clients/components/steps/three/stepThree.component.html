<app-select-field
  label="Loja"
  [options]="lojas"
  [(ngModel)]="loja"
  labelBgColor="#fff"
  (ngModelChange)="lojaChange.emit($event)"
></app-select-field>

<app-select-field
  label="Tipo Legal"
  [options]="tiposLegais"
  [(ngModel)]="tipoLegal"
  labelBgColor="#fff"
  (ngModelChange)="tipoLegalChange.emit($event)"
></app-select-field>

<app-input-field label="Observações" [(ngModel)]="notes" labelBgColor="#fff"></app-input-field>
