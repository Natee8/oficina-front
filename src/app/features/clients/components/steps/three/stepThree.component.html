<app-select-field
  label="Lojas"
  [options]="lojas"
  [multiple]="true"
  [(ngModel)]="data.loja"
  [errorMessage]="errors['loja']"
  labelBgColor="#fff"
></app-select-field>

<app-select-field
  label="Tipo Legal"
  [options]="tiposLegais"
  [(ngModel)]="data.tipoLegal"
  [disabled]="true"
  [errorMessage]="errors['tipoLegal']"
  labelBgColor="#fff"
></app-select-field>

<app-input-field label="Observações" [(ngModel)]="data.notes" labelBgColor="#fff"></app-input-field>
