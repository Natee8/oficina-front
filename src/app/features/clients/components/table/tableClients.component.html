<app-table-header
  icon="fa-solid fa-users"
  title="Clientes"
  (search)="handleSearch($event)"
></app-table-header>

<div class="table-container">
  <div class="table-scroll">
    <div class="table table-grid">
      <div
        class="table-head"
        [style.grid-template-columns]="
          'minmax(160px,1fr) minmax(180px,1.2fr) minmax(140px,1fr) minmax(140px,1fr) minmax(140px,1fr) minmax(200px,1.5fr) minmax(140px,1fr) 120px'
        "
      >
        <div
          *ngFor="let col of columns"
          class="table-head-cell"
          [class.sortable]="!!col.sortKey"
          [class.active-sort]="sortColumn === col.sortKey"
          (click)="toggleSort(col)"
        >
          <span>{{ col.label }}</span>
          <span class="sort-indicator" *ngIf="getSortIndicator(col)">{{ getSortIndicator(col) }}</span>
        </div>
      </div>

      <div
        class="table-row"
        *ngFor="let client of paginatedClients"
        [style.grid-template-columns]="
          'minmax(160px,1fr) minmax(180px,1.2fr) minmax(140px,1fr) minmax(140px,1fr) minmax(140px,1fr) minmax(200px,1.5fr) minmax(140px,1fr) 120px'
        "
      >
        <div class="table-cell">{{ client.name }}</div>
        <div class="table-cell">{{ client.cpfCnpj }}</div>
        <div class="table-cell">{{ getStoreNames(client.unitIds) }}</div>
        <div class="table-cell">{{ client.addressCity }}</div>
        <div class="table-cell">{{ client.addressDistrict }}</div>
        <div class="table-cell">{{ client.email }}</div>
        <div class="table-cell">{{ client.phone }}</div>

        <div class="table-cell">
          <app-table-actions (onEdit)="handleEdit(client)" (onDelete)="handleDelete(client)" />
        </div>
      </div>
    </div>
  </div>

  <app-edit-client-modal
    *ngIf="activeModal === 'edit'"
    [client]="selectedClient!"
    (closeModalEvent)="handleModalClose()"
    (clientUpdated)="handleModalClose(true)"
  ></app-edit-client-modal>

  <app-modal-delete
    *ngIf="activeModal === 'delete'"
    [registro]="selectedClient?.id"
    (confirm)="confirmDelete()"
    (cancel)="closeModal()"
  ></app-modal-delete>

  <!-- Footer de paginação -->
  <app-table-footer
    [page]="page"
    [totalPages]="totalPages"
    [totalItems]="clientList.length"
    [pageSize]="pageSize"
    (pageChange)="changePage($event)"
  ></app-table-footer>
</div>
