<div class="titles">
  <h1>Informações da OS</h1>
  <h2>Adicione as peças utilizadas na OS</h2>
</div>

<form>
  <div class="os-row os-row-pecas">
    <app-input-field
      label="Peças"
      type="text"
      labelBgColor="#fff"
      [(ngModel)]="data.peca"
      (ngModelChange)="clearFieldError('peca')"
      name="peca"
      [errorMessage]="errors['peca']"
      class="input-peca input-flex"
    ></app-input-field>

    <app-input-field
      label="Quantidade"
      type="number"
      labelBgColor="#fff"
      [(ngModel)]="data.quantidade"
      (ngModelChange)="clearFieldError('quantidade')"
      name="quantidade"
      [errorMessage]="errors['quantidade']"
      class="input-qtd input-flex"
      min="1"
      step="1"
    ></app-input-field>

    <app-input-field
      label="Valor Unitário"
      type="text"
      labelBgColor="#fff"
      [(ngModel)]="data.valorUnitario"
      (ngModelChange)="clearFieldError('valorUnitario')"
      name="valorUnitario"
      [errorMessage]="errors['valorUnitario']"
      class="input-qtd input-flex"
      mask="currency"
    ></app-input-field>

    <button type="button" class="btn-circle-add" title="Adicionar" (click)="adicionar()">
      <i class="fa fa-plus"></i>
    </button>
  </div>

  <div class="titles">
    <hr class="pecas-divider" />
    <h1>Novas peças</h1>
    <h2>Visualize e gerencie as novas peças</h2>
  </div>

  <div class="pecas-lista">
    <div class="peca-card" *ngFor="let peca of pecasAdicionadas">
      <div class="peca-info">
        <div class="peca-nome">{{ peca.nome }}</div>
        <div class="peca-valores">
          <span>Unitário: {{ formatCurrency(peca.valorUnitario) }}</span>
          <span>Total: {{ formatCurrency(getTotalValue(peca)) }}</span>
        </div>
      </div>

      <div class="peca-controles">
        <button type="button" class="peca-btn" (click)="diminuir(peca)">-</button>
        <span class="peca-quantidade">{{ peca.quantidade }}</span>
        <button type="button" class="peca-btn" (click)="aumentar(peca)">+</button>
      </div>

      <button type="button" class="peca-delete" (click)="remover(peca)">
        <i class="fa fa-trash"></i>
      </button>
    </div>
  </div>
</form>
