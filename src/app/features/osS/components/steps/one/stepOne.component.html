<div class="titles">
  <h1>Informações da OS</h1>
  <h2>Cadastre uma nova ordem de serviço</h2>
</div>

<form>
  <div class="os-row os-row-3">
    <div class="field">
      <app-select-field
        label="Loja"
        [options]="lojaOptions"
        labelBgColor="#fff"
        [(ngModel)]="data.loja"
        name="loja"
      ></app-select-field>
      <div *ngIf="errors['loja']" class="error">
        {{ errors['loja'] }}
      </div>
    </div>

    <div class="field">
      <app-select-field
        label="Cliente"
        [options]="clienteOptions"
        labelBgColor="#fff"
        [disabled]="!data.loja"
        [(ngModel)]="data.cliente"
        name="cliente"
      ></app-select-field>
      <div *ngIf="errors['cliente']" class="error">
        {{ errors['cliente'] }}
      </div>
    </div>

    <div class="field">
      <app-select-field
        label="Veículo"
        [options]="veiculoOptions"
        labelBgColor="#fff"
        [disabled]="!data.loja || !data.cliente"
        [(ngModel)]="data.veiculo"
        name="veiculo"
      ></app-select-field>
      <div *ngIf="errors['veiculo']" class="error">
        {{ errors['veiculo'] }}
      </div>
    </div>
  </div>

  <div class="os-row">
    <div class="field input-flex">
      <app-input-field
        label="Data de Entrada"
        type="date"
        labelBgColor="#fff"
        [(ngModel)]="data.dataEntrada"
        name="dataEntrada"
      ></app-input-field>
      <div *ngIf="errors['dataEntrada']" class="error">
        {{ errors['dataEntrada'] }}
      </div>
    </div>

    <div class="field input-flex">
      <app-input-field
        label="Previsão data de saída"
        type="date"
        labelBgColor="#fff"
        [(ngModel)]="data.dataSaida"
        name="dataSaida"
      ></app-input-field>
      <div *ngIf="errors['dataSaida']" class="error">
        {{ errors['dataSaida'] }}
      </div>
    </div>
  </div>

  <div class="os-row">
    <div class="os-field-group">
      <div class="field">
        <app-input-field
          label="Pintura"
          labelBgColor="#fff"
          type="text"
          [(ngModel)]="data.pintura"
          name="pintura"
        ></app-input-field>

        <div *ngIf="errors['pintura']" class="error">
          {{ errors['pintura'] }}
        </div>
      </div>

      <div class="field small-input">
        <app-input-field
          label="Valor da pintura"
          type="text"
          labelBgColor="#fff"
          [(ngModel)]="data.valorPintura"
          name="valorPintura"
          mask="currency"
        ></app-input-field>

        <div *ngIf="errors['valorPintura']" class="error">
          {{ errors['valorPintura'] }}
        </div>
      </div>
    </div>
  </div>

  <div class="os-row">
    <div class="os-field-group">
      <div class="field">
        <app-input-field
          label="Funilaria"
          labelBgColor="#fff"
          type="text"
          [(ngModel)]="data.funilaria"
          name="funilaria"
        ></app-input-field>

        <div *ngIf="errors['funilaria']" class="error">
          {{ errors['funilaria'] }}
        </div>
      </div>

      <div class="field small-input">
        <app-input-field
          label="Valor da Funilaria"
          type="text"
          labelBgColor="#fff"
          [(ngModel)]="data.valorFunilaria"
          name="valorFunilaria"
          mask="currency"
        ></app-input-field>

        <div *ngIf="errors['valorFunilaria']" class="error">
          {{ errors['valorFunilaria'] }}
        </div>
      </div>
    </div>
  </div>
</form>
