<ng-container *ngIf="!segundaEtapa">
  <app-os-step-one
    [lojas]="lojas"
    [clientes]="clientes"
    [veiculos]="veiculos"
    [(loja)]="loja"
    [(cliente)]="cliente"
    [(veiculo)]="veiculo"
    [(dataEntrada)]="dataEntrada"
    [(dataSaida)]="dataSaida"
    [(pintura)]="pintura"
    [(funilaria)]="funilaria"
    [(valorPintura)]="valorPintura"
    [(valorFunilaria)]="valorFunilaria"
  ></app-os-step-one>
</ng-container>

<ng-container *ngIf="segundaEtapa">
  <app-os-step-two
    [(peca)]="peca"
    [(quantidade)]="quantidade"
    [(valorUnitario)]="valorUnitario"
    (adicionar)="adicionarPeca()"
    [pecasAdicionadas]="pecasAdicionadas"
    (remover)="removerPeca($event)"
    (aumentar)="aumentarQuantidade($event)"
    (diminuir)="diminuirQuantidade($event)"
  ></app-os-step-two>
</ng-container>
