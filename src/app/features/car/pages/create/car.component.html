<div class="containerHeader">
  <h1>Novo Veículo</h1>
  <p>Adicione um novo veículo à sua loja</p>
  <app-back-button (back)="goBackList()"></app-back-button>
</div>

<app-register-card
  [title]="steps[stepIndex].title"
  [subtitle]="steps[stepIndex].description"
  [stpsatual]="stepIndex + 1"
  [steptotal]="steps.length"
  [image]="steps[stepIndex].image"
  [backgroundImage]="steps[stepIndex].background"
  (next)="nextStep()"
  (back)="previousStep()"
>
  <ng-container [ngSwitch]="stepIndex">
    <app-step-one-car
      *ngSwitchCase="0"
      [(cliente)]="cliente"
      [(plate)]="plate"
      [(year)]="year"
      [(vin)]="vin"
      [(renavam)]="renavam"
      [(insuranceClaimNumber)]="insuranceClaimNumber"
      [clientes]="clientes"
    ></app-step-one-car>

    <app-step-two-car
      *ngSwitchCase="1"
      [(brand)]="brand"
      [(model)]="model"
      [(color)]="color"
      [(notes)]="notes"
    ></app-step-two-car>
  </ng-container>
</app-register-card>
