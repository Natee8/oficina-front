<app-input-field
  label="Marca"
  type="text"
  labelBgColor="#fff"
  [(ngModel)]="brand"
  (ngModelChange)="brandChange.emit($event)"
></app-input-field>

<app-input-field
  label="Modelo"
  type="text"
  labelBgColor="#fff"
  [(ngModel)]="model"
  (ngModelChange)="modelChange.emit($event)"
></app-input-field>

<app-input-field
  label="Cor"
  type="text"
  labelBgColor="#fff"
  [(ngModel)]="color"
  (ngModelChange)="colorChange.emit($event)"
></app-input-field>

<app-input-field
  label="Observações"
  type="text"
  labelBgColor="#fff"
  [(ngModel)]="notes"
  (ngModelChange)="notesChange.emit($event)"
></app-input-field>
