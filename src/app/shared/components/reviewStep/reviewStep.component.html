<div class="review">
  <div class="section" *ngFor="let section of sections">
    <h3>{{ section.title }}</h3>

    <div class="grid">
      <div class="item" *ngFor="let field of section.fields">
        <span class="label">{{ field.label }}</span>
        <span class="value">
          {{ field.value || '-' }}
        </span>
      </div>
    </div>
  </div>
</div>
