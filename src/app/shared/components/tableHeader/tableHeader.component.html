<div class="table">
  <header class="table-header">
    <div class="title">
      <img *ngIf="iconSrc" [src]="iconSrc" [alt]="title" class="title-image" />
      <i *ngIf="!iconSrc" [class]="icon"></i>
      <p>{{ title }}</p>
    </div>

    <div class="search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" placeholder="Pesquisar" (input)="search.emit($any($event.target).value)" />
    </div>
  </header>
</div>
