<div class="overlay" (click)="fechar()">
  <div
    class="modal-content"
    (click)="stopPropagation($event)"
    [ngStyle]="{
      'min-width': minWidth,
      'min-height': minHeight,
    }"
  >
    <button class="close-btn" (click)="fechar()">
      <i class="fa-solid fa-xmark"></i>
    </button>
    <ng-content></ng-content>
  </div>
</div>
