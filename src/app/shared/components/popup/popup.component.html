<div class="overlay" (click)="fechar()">
  <div
    class="modal-content"
    (click)="stopPropagation($event)"
    [ngStyle]="{ 'min-width': minWidth, 'min-height': minHeight }"
  >
    <div *ngIf="hasHeader" class="modal-header-top">
      <button class="close-btn" (click)="fechar()">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="modal-inner">
      <ng-content></ng-content>
    </div>
  </div>
</div>
