<div class="input-simple">
  <input
    [type]="inputType"
    [id]="id"
    [(ngModel)]="value"
    (ngModelChange)="onInput($event)"
    (focus)="inputFocused = true"
    (blur)="onBlur(); inputFocused = false"
    [attr.maxlength]="maxlength"
    [disabled]="disabled"
    [appMask]="mask"
    required
  />
  <label [class.floating]="value || inputFocused" [for]="id">{{ label }}</label>

  <span *ngIf="type === 'password' && !disabled" class="toggle-password" (click)="togglePassword()">
    <i class="fa" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
  </span>
</div>
