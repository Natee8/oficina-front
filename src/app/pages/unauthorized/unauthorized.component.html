<div class="error-container">
  <div class="glow-bg"></div>

  <div class="error-content">
    <div class="error-code">
      <span class="digit d1">4</span>
      <span class="digit d2">0</span>
      <span class="digit d3">1</span>
    </div>

    <h1 class="title">Acesso Negado</h1>

    <p class="subtitle">Sua sessão expirou ou você não tem permissão para acessar esta área.</p>

    <div class="actions">
      <button routerLink="/" class="btn primary">Voltar ao Login</button>
      <button (click)="reload()" class="btn secondary">Tentar novamente</button>
    </div>
  </div>
</div>
