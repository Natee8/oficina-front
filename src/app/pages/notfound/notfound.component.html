<div class="error-container">
  <div class="stars"></div>

  <div class="error-content">
    <div class="error-code">
      <span class="digit d1">4</span>
      <span class="digit d2">0</span>
      <span class="digit d3">4</span>
    </div>

    <h1 class="title">Página não encontrada</h1>

    <p class="subtitle">Parece que você se perdeu no sistema... essa página não existe.</p>

    <div class="actions">
      <button routerLink="/" class="btn primary">Voltar ao início</button>
      <button (click)="goBack()" class="btn secondary">Voltar</button>
    </div>
  </div>
</div>
