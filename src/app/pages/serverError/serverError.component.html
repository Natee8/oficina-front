<div class="error-container">
  <div class="waves"></div>

  <div class="error-content">
    <div class="error-code">
      <span class="digit d1">5</span>
      <span class="digit d2">0</span>
      <span class="digit d3">0</span>
    </div>

    <h1 class="title">Erro interno do servidor</h1>

    <p class="subtitle">Algo deu errado no sistema. Tente novamente em alguns instantes.</p>

    <div class="actions">
      <button routerLink="/" class="btn primary">Voltar ao início</button>
      <button (click)="reload()" class="btn secondary">Recarregar</button>
    </div>
  </div>
</div>
